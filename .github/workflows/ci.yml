name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Typecheck CLI (root tsconfig)
        run: npx tsc --noEmit
      - name: Typecheck web viewer
        run: npm run web:typecheck
      - name: Unit tests
        run: npm test
      - name: Build web viewer (static bundle)
        run: npm run web:build
